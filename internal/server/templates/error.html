<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ .Code }} — Ошибка</title>
  <script>
  (function () {
    const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const dark = localStorage.theme === 'dark' || (!localStorage.theme && prefers);
    if (dark) document.documentElement.classList.add('theme-dark');
  })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">

    <div class="topbar">
        <span class="brand">Groupie&nbsp;Tracker</span>

        <div class="topbar-right">
            <button id="refresh-btn">Обновить</button>
            <label class="toggle">
            <input type="checkbox" id="theme-switch">
            <span class="slider"></span>
            </label>
        </div>
    </div>

    <div style="text-align:center;padding-top:4rem;">
      <h1>Ошибка {{ .Code }}</h1>
      <p style="margin:1rem 0 2rem;">{{ .Message }}</p>
      <a href="/" class="back">← На главную</a>
    </div>

  </div>
  <script src="/static/ui.js"></script>
</body>
</html>
